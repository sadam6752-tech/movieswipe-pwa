# ============================================================================
# Docker Compose Configuration for movieswipe-pwa
# ============================================================================
# This file defines the Docker Compose setup for local development and testing.
# Use this for quick local testing without manual Docker commands.
# ============================================================================

version: '3.8'

services:
  # ========================================================================
  # movieswipe-pwa Service
  # ========================================================================
  movieswipe-pwa:
    # Build from local Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    
    # Container name for easy reference
    container_name: movieswipe-pwa-dev
    
    # Port mapping: host:container
    ports:
      - "3000:3000"
    
    # Environment variables
    environment:
      # Node environment
      NODE_ENV: production
      
      # Optional: Nginx configuration
      # NGINX_WORKER_PROCESSES: auto
      # NGINX_WORKER_CONNECTIONS: 1024
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    # Resource limits (optional)
    # Uncomment to enable resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Labels for identification
    labels:
      - "com.movieswipe.description=MovieSwipe PWA Application"
      - "com.movieswipe.version=1.0.0"
    
    # Volumes for data persistence
    volumes:
      - ./../../movieswipe-pwa/public/data:/usr/share/nginx/html/data

  # ========================================================================
  # movieswipe-sync Service (Data Synchronization)
  # ========================================================================
  # This service runs data synchronization scripts to fetch movie data
  # from TMDB, Poiskkino, and other sources.
  # Run manually: docker-compose run movieswipe-sync
  movieswipe-sync:
    # Build from Dockerfile.sync
    build:
      context: .
      dockerfile: Dockerfile.sync
    
    # Container name
    container_name: movieswipe-sync
    
    # Don't start automatically - run manually when needed
    profiles:
      - sync
    
    # Environment variables for API keys
    environment:
      NODE_ENV: production
      # Add your API keys here or pass via .env file
      # TMDB_API_KEY: ${TMDB_API_KEY}
      # POISKKINO_API_KEY: ${POISKKINO_API_KEY}
    
    # Volumes for data persistence
    volumes:
      - ./../../movieswipe-pwa/public/data:/app/public/data
    
    # Restart policy - don't restart automatically
    restart: "no"
    
    # Labels
    labels:
      - "com.movieswipe.description=MovieSwipe Data Synchronization"
      - "com.movieswipe.version=1.0.0"

# ============================================================================
# Networks
# ============================================================================
# Define custom network for service communication
networks:
  default:
    name: movieswipe-network
    driver: bridge

# ============================================================================
# Volumes (optional)
# ============================================================================
# Define volumes for persistent data if needed
# volumes:
#   movieswipe-data:
#     driver: local
